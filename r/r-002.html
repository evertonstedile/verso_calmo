    .presente__foto {

    }
    .presente__veu {

    .presente__frase em { font-style: italic; }
    .presente__rodape {
      position: absolute; left: 1.75rem; right: 1.75rem; z-index: 2;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 2.5rem);
      display: flex; flex-direction: column; align-items: center; gap: 1.1rem; text-align: center;
    }
    .presente__assinatura {
      font-family: 'Manrope', sans-serif; font-weight: 400;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;

    .presente__convite {

      font-size: 1.0625rem; line-height: 1.4; color: rgba(246,239,229,0.82);
