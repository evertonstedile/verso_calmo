<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>obrigada — verso calmo</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Manrope:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Manrope', sans-serif;
      color: var(--vc-sal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.75rem;
      text-align: center;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('../assets/garopaba/01-hero-garopaba.webp');
      background-size: cover;
      background-position: center;
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(16, 20, 23, 0.80);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      z-index: -1;
    }

    .obrigado__titulo {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      line-height: 1.3;
      color: var(--vc-areia-umida);
      margin-bottom: 1.5rem;
      max-width: 560px;
    }

    .obrigado__corpo {
      font-size: clamp(0.9375rem, 2.5vw, 1.0625rem);
      line-height: 1.7;
      color: var(--vc-tinta-mar-suave);
      max-width: 480px;
      margin-bottom: 3rem;
    }

    .obrigado__corpo strong {
      color: var(--vc-sal);
      font-weight: 500;
    }

    .obrigado__link {
      font-size: 0.875rem;
      color: var(--vc-tinta-mar-suave);
      text-decoration: none;
      letter-spacing: 0.03em;
      border-bottom: 1px solid var(--vc-borda);
      padding-bottom: 2px;
      transition: color 200ms ease, border-color 200ms ease;
    }

    .obrigado__link:hover {
      color: var(--vc-areia-umida);
      border-color: var(--vc-areia-umida);
    }

    .obrigado__insta {
      color: var(--vc-areia-umida);
      text-decoration: none;
      border-bottom: 1px solid rgba(200, 167, 125, 0.35);
      transition: border-color 200ms ease;
    }
    .obrigado__insta:hover { border-color: var(--vc-areia-umida); }
  </style>
</head>
<body>
  <h1 class="obrigado__titulo">teu lugar está guardado.</h1>
  <p class="obrigado__corpo">
    quando o <strong>Respiro de Garopaba</strong> abrir,
    você é uma das primeiras a saber.<br><br>
    enquanto isso, tem um respiro novo todo dia
    no <a href="https://www.instagram.com/versocalmo" target="_blank" rel="noopener noreferrer" class="obrigado__insta">@versocalmo</a>.
  </p>
  <a class="obrigado__link" href="/">voltar para o início</a>
</body>
</html>
